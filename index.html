const STAGE_NAMES = ['', '现场勘查', '人物排查', '线索追踪', '营救与对峙', '真相还原'];

// ==================== Game State ====================
let state = {
  stage: 0,
  clues: [],
  score: 0,
  notes: '',
  stage1Examined: [],
  stage2Interrogated: [],
  stage3Investigated: [],
  stage3Deductions: {},
  stage4Choice: null,
  stage4TimeLeft: 300,
  stage5Answers: {},
  timerInterval: null,
  rescued: false,
  correctKiller: false,
  gameEnded: false,
};

// ==================== Helpers ====================
function $(id) { return document.getElementById(id); }
function el(tag, cls, html) { const e = document.createElement(tag); if (cls) e.className = cls; if (html !== undefined) e.innerHTML = html; return e; }

function showToast(text, icon) {
  const t = $('toast');
  $('toastText').textContent = text;
  t.querySelector('.toast-icon').textContent = icon || '📌';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

function collectClue(id) {
  if (state.clues.includes(id)) return false;
  state.clues.push(id);
  state.score += 10;
  updateHeader();
  const c = CLUES[id];
  showToast('获得线索：' + c.name, '🔍');
  return true;
}

function updateHeader() {
  $('clueCount').textContent = state.clues.length;
  $('clueTotal').textContent = Object.keys(CLUES).length;
  $('scoreVal').textContent = state.score;
  $('hdrStage').innerHTML = '阶段 <span class="cur">' + STAGE_NAMES[state.stage] + '</span>';
}

function setFooter(html) { $('ftr').innerHTML = html; }
function setMain(html) { $('main').innerHTML = html; $('main').scrollTop = 0; }

function renderStageHeader(label, title, desc) {
  return `<div class="stage-hdr">
    <span class="label">${label}</span>
    <h2>${title}</h2>
    <p class="desc">${desc}</p>
  </div>`;
}

function renderProgress(current, total) {
  const pct = Math.round((current / total) * 100);
  return `<div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>`;
}

function examineStage1(id) {
  const h = window._s1Hotspots.find(x => x.id === id);
  if (!h) return;

  if (!state.stage1Examined.includes(id)) {
    state.stage1Examined.push(id);
    collectClue(h.clue);
  }

  // Show evidence popup
  const clue = CLUES[h.clue];
  const popup = el('div', 'evidence-popup show');
  popup.innerHTML = `
    <div class="ev-head">
      <h4>${h.icon} ${h.title}</h4>
      <span class="ev-close" onclick="closeEvidence()">✕</span>
    </div>
    <div class="ev-body">${h.desc}</div>
    <div class="ev-clue">
      <div class="clue-label">📌 已收录线索</div>
      <div class="clue-name">${clue.name}</div>
    </div>`;
  document.body.appendChild(popup);

  // Add backdrop
  const bd = el('div', 'backdrop show');
  bd.id = 'evBackdrop';
  bd.onclick = closeEvidence;
  document.body.appendChild(bd);

  // Update hotspot state
  const spot = document.querySelector(`.hotspot[data-id="${id}"]`);
  if (spot) spot.classList.add('examined');

  renderStage1Progress();
}

function closeEvidence() {
  const popup = document.querySelector('.evidence-popup');
  if (popup) popup.remove();
  const bd = $('evBackdrop');
  if (bd) bd.remove();

  // Check if stage 1 is complete
  if (state.stage1Examined.length >= 3 && !$('stage1Next')) {
    renderStage1Complete();
  }
}

function renderStage1Progress() {
  const total = window._s1Hotspots.length;
  const examined = state.stage1Examined.length;
  const bar = document.querySelector('.progress-bar .fill');
  if (bar) bar.style.width = Math.round((examined / total) * 100) + '%';
}

function investigate(id) {

    // Deduction question for tie
    html += `<div class="chain-box" style="margin-top:16px">

      <div class="choices">`;

      { id: 'C', text: '领带与案件无关，只是巧合', correct: false },
    ];

    options.forEach((opt, i) => {
      const answered = state.stage3Deductions.tie;
      let cls = '';
      if (answered) {
        if (answered === opt.id && opt.correct) cls = 'correct';
        else if (answered === opt.id && !opt.correct) cls = 'wrong';
        else if (opt.correct) cls = 'correct';
      }
      html += `<button class="choice-btn ${cls}" onclick="deductTie('${opt.id}')" ${answered ? 'disabled' : ''}>
        <span class="cb-num">${i + 1}</span>${opt.text}
      </button>`;
    });

    html += `</div></div>`;
  }

  html += '</div>';
  area.innerHTML = html;

  // Update hotspot
  const spot = document.querySelector(`.hotspot[data-id="${id}"]`);
  if (spot) spot.classList.add('examined');

  // Update progress
  const bar = document.querySelector('.progress-bar .fill');
  if (bar) bar.style.width = Math.round((state.stage3Investigated.length / window._s3Investigations.length) * 100) + '%';

  if (state.stage3Investigated.length >= 4 && !$('s3Next')) {

  }
}

function deductTie(answer) {

function startTimer() {
  state.stage4TimeLeft = 300;
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.stage4TimeLeft--;
    const m = Math.floor(state.stage4TimeLeft / 60);
    const s = state.stage4TimeLeft % 60;
    const timerEl = $('timerVal');
    if (timerEl) timerEl.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');

    if (state.stage4TimeLeft <= 60) {
      $('timerBox')?.classList.add('warning');
    }

    if (state.stage4TimeLeft <= 0) {
      clearInterval(state.timerInterval);
      if (!state.stage4Choice) {
        chooseLocation('timeout');
      }
    }
  }, 1000);
}

  state.stage4Choice = choice;

function renderStage5Question(idx) {
  const questions = state._s5Questions;
  if (idx >= questions.length) {
    renderStage5Complete();
    return;
  }

  const q = questions[idx];
  const container = $('s5Questions');

  let html = `<div class="scene-box fade-in" id="qBox_${idx}">
    <p style="font-size:13px;color:var(--accent);margin-bottom:6px">问题 ${idx + 1} / ${questions.length}</p>
    <p style="font-size:15px;font-weight:600;margin-bottom:14px">${q.q}</p>
    <div class="choices">`;

  q.options.forEach((opt, i) => {
    const answered = state.stage5Answers[q.id];
    let cls = '';
    if (answered) {
      if (opt.correct) cls = 'correct';
      else if (answered === opt.id) cls = 'wrong';
    }
    html += `<button class="choice-btn ${cls}" onclick="answerQ5('${q.id}','${opt.id}',${idx})" ${answered ? 'disabled' : ''}>
      <span class="cb-num">${i + 1}</span>${opt.text}
    </button>`;
  });

  html += `</div>`;

  if (state.stage5Answers[q.id]) {
    if (state.stage5Answers[q.id] === q.options.find(o => o.correct).id) {
      html += `<div style="margin-top:14px;padding:12px;background:rgba(76,175,125,.1);border:1px solid var(--success);border-radius:6px">
        <p style="font-size:13px;color:var(--success);margin-bottom:6px">✅ ${q.correctText}</p>
      </div>`;
    } else {
      html += `<div style="margin-top:14px;padding:12px;background:rgba(232,93,74,.1);border:1px solid var(--danger);border-radius:6px">
        <p style="font-size:13px;color:var(--danger);margin-bottom:6px">❌ 推理有误。正确答案：${q.options.find(o => o.correct).text}</p>
        <p style="font-size:13px;color:var(--ink)">${q.correctText}</p>
      </div>`;
    }
    html += `<div style="margin-top:12px;text-align:right">
      <button class="btn-primary" onclick="renderStage5Question(${idx + 1})">${idx + 1 < questions.length ? '下一题 →' : '查看结局 →'}</button>
    </div>`;
  }

  html += '</div>';

  if (idx === 0) {
    container.innerHTML = html;
  } else {
    container.innerHTML += html;
  }

  // Scroll to new question
  setTimeout(() => {
    const box = $('qBox_' + idx);
    if (box) box.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function answerQ5(qid, aid, idx) {
  if (state.stage5Answers[qid]) return;
  state.stage5Answers[qid] = aid;

  const q = state._s5Questions.find(x => x.id === qid);
  const correct = q.options.find(o => o.id === aid).correct;

  if (correct) {
    state.score += 15;
    collectClue(q.clue);
  } else {
    showToast('推理有误', '❌');
  }
  updateHeader();
  renderStage5Question(idx); // Re-render to show answer
}

function renderStage5Complete() {
  const allCorrect = Object.keys(state.stage5Answers).every(qid => {
    const q = state._s5Questions.find(x => x.id === qid);
    return state.stage5Answers[qid] === q.options.find(o => o.correct).id;
  });

  const correctCount = Object.keys(state.stage5Answers).filter(qid => {
    const q = state._s5Questions.find(x => x.id === qid);
    return state.stage5Answers[qid] === q.options.find(o => o.correct).id;
  }).length;

  const result = $('s5Result');
  result.innerHTML = `<div class="scene-box fade-in">
    <p class="scene-desc" style="color:var(--accent2)">审讯室内的灯光惨白而刺眼。</p>
    <p class="scene-desc">赵浩昌——赵丰年——缓缓开口：<br><br>"我用了十年。十年，从一个贫民区的孤儿，变成即将迎娶富家女的律师。何忠义来了，他叫我'丰年哥'，他到处跟人说认识我……我给了他十万块，我求他别说了。可他还是来找我。他说'丰年哥，你发达了不能忘本'……"<br><br>他低下头："我不能让任何人知道赵丰年就是赵浩昌。任何人。你知道穷人最怕什么吗？不是穷。是穷过之后被人翻出来——那些贫穷、那些火、那些……"<br><br>他没有说完。骆闻舟沉默地看着他，缓缓道："你用十年逃离过去，又用一天亲手毁掉了未来。"<br><br>案件终结。何忠义的冤屈得以昭雪，花市分局的腐败黑幕也因此案被牵出。但有些东西——那个贫民区少年的梦想，那场烧毁一切的火——永远无法挽回了。</p>
  </div>`;

  setFooter(`<div style="display:flex;justify-content:flex-end">
    <button class="btn-primary" onclick="showEnding()">查看结局 →</button>
  </div>`);
}

// ==================== Ending ====================
function showEnding() {
  state.gameEnded = true;
  state.stage = 6;
  if (state.timerInterval) clearInterval(state.timerInterval);

  const totalClues = Object.keys(CLUES).length;
  const clueCount = state.clues.length;
  const cluePct = clueCount / totalClues;

  let rank, title, desc;

  // Determine correct killer
  state.correctKiller = true; // They always identify Zhao Haochang through the game flow

  if (cluePct >= 0.9 && state.rescued && state.stage4Choice === 'C') {
    rank = 'S';
    title = '完美结局';
    desc = '你成功收集了全部关键线索，正确指认真凶赵浩昌（赵丰年），第一时间成功营救何母王秀娟，完整还原了案件真相。何忠义的冤屈得以昭雪，花市分局的腐败黑幕也因此案被牵出。你的调查堪称教科书级别。';
  } else if (cluePct >= 0.7 && state.rescued) {
    rank = 'A';
    title = '良好结局';
    desc = '你锁定了真凶赵浩昌，成功营救了何母。虽然部分线索遗漏，真相未能完全还原，但正义得到了伸张。何忠义的冤屈得以昭雪。';
  } else if (state.rescued) {
    rank = 'B';
    title = '普通结局';
    desc = '你最终指认了赵浩昌为凶手，但调查过程中遗漏了不少关键线索，部分真相仍被掩埋。何母虽获救，但花市分局的黑幕未能完全揭开。';
  } else {
    rank = 'C';
    title = '遗憾结局';
    desc = '由于营救何母不及时，案件留下了遗憾。赵浩昌虽最终落网，但关键证据的流失使得部分真相永远无法还原。正义迟到了，但终究没有缺席。';
  }

  // Add bonus for deductions
  if (state.stage3Deductions.tie === 'B') state.score += 10;
  const correctAnswers = Object.keys(state.stage5Answers).filter(qid => {
    const q = state._s5Questions.find(x => x.id === qid);
    return state.stage5Answers[qid] === q.options.find(o => o.correct).id;
  }).length;
  state.score += correctAnswers * 5;

  updateHeader();

  $('hdr').style.display = 'none';
  $('ftr').style.display = 'none';
  setMain(`<div class="screen active">
    <div class="ending-wrap">
      <div class="ending-rank ${rank}">${rank}</div>
      <h2 class="ending-title">${title}</h2>
      <p class="ending-score">最终评分：${state.score} 分</p>
      <div class="ending-stats">
        <div class="ending-stat"><div class="es-num">${clueCount}/${totalClues}</div><div class="es-label">线索收集</div></div>
        <div class="ending-stat"><div class="es-num">${correctAnswers}/4</div><div class="es-label">推理正确</div></div>
        <div class="ending-stat"><div class="es-num">${state.rescued ? '成功' : '失败'}</div><div class="es-label">营救何母</div></div>
      </div>
      <div class="ending-desc">
        <h4>案件总结</h4>
        <p>${desc}</p>
      </div>
      <div class="ending-desc">
        <h4>真相档案</h4>
        <p><b style="color:var(--accent)">被害人：</b>何忠义，外来务工人员，忠厚老实，攒钱给母亲治病。从乡下来燕城打工时认识了同乡"大律师"赵浩昌（原名赵丰年），并不知道自己的存在已威胁到赵浩昌精心打造的"新生"。</p>
        <p style="margin-top:8px"><b style="color:var(--accent)">真凶：</b>赵浩昌（原名赵丰年），律师事务所合伙人。出身贫寒，家人葬身火海（疑似其本人纵火）后改名换姓。即将迎娶富家女张婷时，何忠义的出现让他恐惧过去被揭露——他给了十万元封口费，但何忠义仍不断找他。最终选择在律所扼喉杀人，换衣后抛尸金三角空地，并用领带栽赃张东来。</p>
        <p style="margin-top:8px"><b style="color:var(--accent)">破案关键：</b>新衣吊牌→第一现场非抛尸地；监控→何忠义最后出现于文昌路（赵浩昌律所所在地）；手机→购买者为赵浩昌；领带→刻意栽赃张东来；"丰年哥"→赵浩昌原名赵丰年。</p>
      </div>
      <button class="btn-primary" onclick="resetGame()">重新调查</button>
    </div>
  </div>`);
}

function resetGame() {
  state = {
    stage: 0, clues: [], score: 0, notes: state.notes || '',
    stage1Examined: [], stage2Interrogated: [], stage3Investigated: [],
    stage3Deductions: {}, stage4Choice: null, stage4TimeLeft: 300,
    stage5Answers: {}, timerInterval: null, rescued: false,
    correctKiller: false, gameEnded: false,
  };
  showStart();
}

// ==================== Clue Panel ====================
function toggleCluePanel() {
  const panel = $('cluePanel');
  const overlay = $('panelOverlay');
  const isOpen = panel.classList.contains('show');

  if (isOpen) {
    panel.classList.remove('show');
    overlay.classList.remove('show');
  } else {
    renderCluePanel();
    panel.classList.add('show');
    overlay.classList.add('show');
  }
}

function renderCluePanel() {
  const body = $('cpBody');
  if (state.clues.length === 0) {
    body.innerHTML = '<div class="cp-empty">尚未收集到任何线索<br>继续调查以获取更多线索</div>';
    return;
  }

  let html = '';
  state.clues.forEach(id => {
    const c = CLUES[id];
    html += `<div class="clue-card">
      <div class="cc-stage">阶段 ${c.stage}</div>
      <div class="cc-title">${c.name}</div>
      <div class="cc-detail">${c.detail}</div>
    </div>`;
  });
  body.innerHTML = html;
}

// ==================== Note Modal ====================
function toggleNoteModal() {
  const modal = $('noteModal');
  const bd = $('noteBackdrop');
  const isOpen = modal.classList.contains('show');

  if (isOpen) {
    modal.classList.remove('show');
    bd.classList.remove('show');
  } else {
    $('noteText').value = state.notes;
    modal.classList.add('show');
    bd.classList.add('show');
  }
}

function saveNote() {
  state.notes = $('noteText').value;
  toggleNoteModal();
  showToast('笔记已保存', '📝');
}

// ==================== Keyboard Navigation ====================
document.addEventListener('keydown', function(e) {
  // Global keys
  if (e.key === 'i' || e.key === 'I') { toggleCluePanel(); return; }
  if (e.key === 'n' || e.key === 'N') { toggleNoteModal(); return; }
  if (e.key === 'Escape') {
    if ($('cluePanel').classList.contains('show')) { toggleCluePanel(); return; }
    if ($('noteModal').classList.contains('show')) { toggleNoteModal(); return; }
    if (document.querySelector('.evidence-popup')) { closeEvidence(); return; }
    return;
  }

  // Number keys for stage interactions
  if (state.stage === 1 && window._s1Hotspots) {
    const idx = parseInt(e.key) - 1;
    if (idx >= 0 && idx < window._s1Hotspots.length) {
      examineStage1(window._s1Hotspots[idx].id);
      return;
    }
  }

  if (state.stage === 2 && window._s2Chars) {
    const idx = parseInt(e.key) - 1;
    if (idx >= 0 && idx < window._s2Chars.length) {
      interrogate(window._s2Chars[idx].id);
      return;
    }
  }

  if (state.stage === 3 && window._s3Investigations) {
    const idx = parseInt(e.key) - 1;
    if (idx >= 0 && idx < window._s3Investigations.length) {
      investigate(window._s3Investigations[idx].id);
      return;
    }
  }

  if (state.stage === 4 && !state.stage4Choice) {
    const map = { '1': 'A', '2': 'B', '3': 'C', '4': 'D' };
    if (map[e.key]) { chooseLocation(map[e.key]); return; }
  }

  // Enter for start
  if (e.key === 'Enter') {
    if (state.stage === 0) { startGame(); return; }
    // Close evidence popup
    if (document.querySelector('.evidence-popup')) { closeEvidence(); return; }
  }
});

// ==================== Init ====================
$('btnInventory').onclick = toggleCluePanel;
$('btnNotes').onclick = toggleNoteModal;
$('cpClose').onclick = toggleCluePanel;
$('panelOverlay').onclick = toggleCluePanel;
$('nmClose').onclick = toggleNoteModal;
$('noteBackdrop').onclick = toggleNoteModal;
$('nmSave').onclick = saveNote;

showStart();
</script>
